# HTB market-data stack: TimescaleDB + one-shot migrations + the loader.
#
# Usage (from the repo root):
#   docker compose -f deploy/docker-compose.yml up --build
#
# Build contexts are set to the repo root (`..`) because the .NET images need the
# solution and csproj graph to restore.
name: hawkeye-trading-bot

services:

  timescale-db:
    container_name: timescale-db
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hawkeye-db}
      POSTGRES_USER: ${POSTGRES_USER:-hawkeye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hawkeye}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./timescale-db/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hawkeye} -d ${POSTGRES_DB:-hawkeye}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  marketdata-migrations:
    container_name: marketdata-migrations
    build:
      context: ..
      dockerfile: deploy/marketdata/migrations.Dockerfile
    image: hawkeye-trading-bot/marketdata-migrations
    environment:
      HTB_CONNECTION_STRING: "Host=timescale-db;Port=5432;Database=${POSTGRES_DB:-hawkeye};Username=${POSTGRES_USER:-hawkeye};Password=${POSTGRES_PASSWORD:-hawkeye}"
    depends_on:
      timescale-db:
        condition: service_healthy
    # One-shot: applies pending migrations and exits.
    restart: "no"

  marketdata-loader:
    container_name: marketdata-loader
    build:
      context: ..
      dockerfile: deploy/marketdata/loader.Dockerfile
    image: hawkeye-trading-bot/marketdata-loader
    environment:
      HTB_CONNECTION_STRING: "Host=timescale-db;Port=5432;Database=${POSTGRES_DB:-hawkeye};Username=${POSTGRES_USER:-hawkeye};Password=${POSTGRES_PASSWORD:-hawkeye}"
      HTB_SYMBOLS_FILE: "/app/symbols.json"
    depends_on:
      timescale-db:
        condition: service_healthy
      marketdata-migrations:
        condition: service_completed_successfully
    restart: on-failure
